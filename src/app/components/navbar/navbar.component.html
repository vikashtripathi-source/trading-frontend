<nav class="navbar">
  <div class="navbar-brand">
    <div class="logo">
      <img src="favicon.ico" alt="TradingHub Logo" class="favicon-logo">
      <span class="logo-text">TradingHub</span>
    </div>
  </div>

  <div class="navbar-menu">
    <a class="nav-item" 
       [class.active]="isRouteActive('dashboard')" 
       routerLink="/dashboard">
      <mat-icon class="nav-icon">dashboard</mat-icon>
      <span class="nav-label">Overview</span>
    </a>
    
    <a class="nav-item" 
       [class.active]="isRouteActive('trading')" 
       routerLink="/trading">
      <mat-icon class="nav-icon">business_center</mat-icon>
      <span class="nav-label">Trading</span>
    </a>
    
    <a class="nav-item" 
       [class.active]="isRouteActive('portfolio')" 
       routerLink="/portfolio">
      <mat-icon class="nav-icon">pie_chart</mat-icon>
      <span class="nav-label">Portfolio</span>
    </a>
    
    <a class="nav-item" 
       [class.active]="isRouteActive('orders')" 
       routerLink="/orders">
      <mat-icon class="nav-icon">list_alt</mat-icon>
      <span class="nav-label">Orders</span>
    </a>
    
    <a class="nav-item" 
       [class.active]="isRouteActive('watchlist')" 
       routerLink="/watchlist">
      <mat-icon class="nav-icon">visibility</mat-icon>
      <span class="nav-label">Watchlist</span>
    </a>
    
    <a class="nav-item" 
       [class.active]="isRouteActive('market')" 
       routerLink="/market">
      <mat-icon class="nav-icon">bar_chart</mat-icon>
      <span class="nav-label">Market</span>
    </a>
    
    <a class="nav-item" 
       [class.active]="isRouteActive('analytics')" 
       routerLink="/analytics">
      <mat-icon class="nav-icon">analytics</mat-icon>
      <span class="nav-label">Analytics</span>
    </a>
  </div>

  <div class="navbar-actions">
    <button class="icon-btn" (click)="toggleDarkMode()" title="Toggle Dark Mode">
      <mat-icon>dark_mode</mat-icon>
    </button>
    
    <button class="icon-btn" title="Notifications">
      <mat-icon>notifications</mat-icon>
      <span class="notification-badge">3</span>
    </button>
    
    <div class="user-menu">
      <button class="user-btn">
        <div class="user-avatar">
          <mat-icon>person</mat-icon>
        </div>
        <span class="user-name">John Doe</span>
        <mat-icon>expand_more</mat-icon>
      </button>
      
      <div class="user-dropdown">
        <a href="#" class="dropdown-item">
          <mat-icon>person</mat-icon>
          Profile
        </a>
        <a href="#" class="dropdown-item">
          <mat-icon>settings</mat-icon>
          Settings
        </a>
        <div class="dropdown-divider"></div>
        <a href="#" class="dropdown-item" (click)="logout()">
          <mat-icon>logout</mat-icon>
          Logout
        </a>
      </div>
    </div>
  </div>
</nav>
