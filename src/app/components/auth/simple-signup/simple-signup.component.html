<div class="signup-container">
  <mat-card class="signup-card">
    <mat-card-header class="card-header">
      <h2 class="card-title">
        <mat-icon>person_add</mat-icon>
        Create Account
      </h2>
      <p class="card-subtitle">Join our trading platform</p>
    </mat-card-header>
    
    <mat-card-content class="card-content">
      <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="signup-form">
        <div class="form-row">
          <div class="form-group">
            <mat-form-field appearance="outline" class="form-field">
              <mat-label>First Name</mat-label>
              <input matInput 
                     type="text" 
                     formControlName="firstName" 
                     placeholder="Enter first name"
                     [disabled]="isLoading">
            </mat-form-field>
          </div>
          
          <div class="form-group">
            <mat-form-field appearance="outline" class="form-field">
              <mat-label>Last Name</mat-label>
              <input matInput 
                     type="text" 
                     formControlName="lastName" 
                     placeholder="Enter last name"
                     [disabled]="isLoading">
            </mat-form-field>
          </div>
        </div>

        <div class="form-group">
          <mat-form-field appearance="outline" class="form-field">
            <mat-label>Email</mat-label>
            <input matInput 
                   type="email" 
                   formControlName="email" 
                   placeholder="Enter your email"
                   [disabled]="isLoading">
            </mat-form-field>
        </div>

        <div class="form-group">
          <mat-form-field appearance="outline" class="form-field">
            <mat-label>Phone</mat-label>
            <input matInput 
                   type="tel" 
                   formControlName="phone" 
                   placeholder="Enter phone number"
                   [disabled]="isLoading">
          </mat-form-field>
        </div>

        <div class="form-group">
          <mat-form-field appearance="outline" class="form-field">
            <mat-label>Date of Birth</mat-label>
            <input matInput 
                   type="date" 
                   formControlName="dateOfBirth" 
                   [disabled]="isLoading">
          </mat-form-field>
        </div>

        <div class="form-group">
          <mat-form-field appearance="outline" class="form-field">
            <mat-label>Password</mat-label>
            <input matInput 
                   [type]="showPassword ? 'text' : 'password'" 
                   formControlName="password" 
                   placeholder="Enter password"
                   [disabled]="isLoading">
            <button mat-icon-button 
                    type="button" 
                    (click)="togglePassword('password')" 
                    matSuffix
                    [disabled]="isLoading">
              <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </mat-form-field>
        </div>

        <div class="form-group">
          <mat-form-field appearance="outline" class="form-field">
            <mat-label>Confirm Password</mat-label>
            <input matInput 
                   [type]="showConfirmPassword ? 'text' : 'password'" 
                   formControlName="confirmPassword" 
                   placeholder="Confirm password"
                   [disabled]="isLoading">
            <button mat-icon-button 
                    type="button" 
                    (click)="togglePassword('confirmPassword')" 
                    matSuffix
                    [disabled]="isLoading">
              <mat-icon>{{ showConfirmPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </mat-form-field>
          <mat-error *ngIf="signupForm.errors?.['passwordMismatch']">
            Passwords do not match
          </mat-error>
        </div>

        <div class="form-actions">
          <button mat-raised-button 
                  type="submit" 
                  color="primary"
                  [disabled]="signupForm.invalid || isLoading"
                  class="submit-btn">
            <mat-icon *ngIf="isLoading" class="spinner">refresh</mat-icon>
            {{ isLoading ? 'Creating Account...' : 'Sign Up' }}
          </button>
        </div>
      </form>
    </mat-card-content>

    <mat-card-actions class="card-actions">
      <p class="login-prompt">
        Already have an account? 
        <button mat-button (click)="goToLogin()" class="login-link">
          Sign In
        </button>
      </p>
    </mat-card-actions>
  </mat-card>
</div>
