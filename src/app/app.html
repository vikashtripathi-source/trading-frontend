<app-navbar *ngIf="showNavbar"></app-navbar>
<main class="main-content" [class.auth-page]="!showNavbar">
  <div class="dashboard-nav" *ngIf="showNavbar">
    <button mat-button (click)="router.navigate(['/dashboard'])" [class.active]="router.url === '/dashboard'">
      Simple Dashboard
    </button>
    <button mat-button (click)="router.navigate(['/dashboard-advanced'])" [class.active]="router.url === '/dashboard-advanced'">
      Advanced Dashboard
    </button>
  </div>
  <router-outlet></router-outlet>
</main>
